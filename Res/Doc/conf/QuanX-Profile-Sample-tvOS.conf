[task_local]
# 本地定时任务

[policy]
# 策略组
# 其中 AdBlock 为屏蔽广告，默认REJECT;
# Apple Update 为屏蔽iOS系统更新的策略组;
# Apple 为苹果服务策略组;
# CMedia 策略组为中国媒体（包括A站、B站、爱奇艺等）;
# GMedia 为国际媒体（包括HULU、HBO等）;
# Netflix 为Netflix策略组;
# Spotify 为Spotify策略组;
# YouTube 为YouTube策略组;
# Outside 指定访问境外网站时的策略或节点;
# Mainland 控制访问大陆网站时的策略;
# Speedtest 为Speedtest测速策略组;
# Others 为其他规则，若前边的规则都没有被匹配到，则听从此策略组的规定。

static=AdBlock, Outside, reject, direct, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Filter/AdBlock.png
static=Apple Update, direct, reject, Outside, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Filter/Apple.png
static=Apple, direct, Outside, reject, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Filter/Apple.png
static=CMedia, direct, proxy, TW, HK, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Filter/CMedia.png
static=GMedia, Outside, direct, HK, TW, JP, SG, US, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Filter/GMedia.png
static=Netflix, GMedia, Outside, direct, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Filter/Netflix.png
static=Spotify, GMedia, Outside, direct, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Filter/Spotify.png
static=YouTube, GMedia, HK, Outside, direct, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Filter/YouTube.png
static=Outside, proxy, direct, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Filter/Outside.png
static=Mainland, direct, proxy, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Filter/Mainland.png
static=Speedtest, Outside, direct, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Filter/Speedtest.png
static=Others, Outside, direct, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Filter/Others.png

# 节点国家策略组
# 包含主流分组： HK[香港],TW[台湾],JP[日本],KR[韩国],SG[新加坡],US[美国],UN[俄罗斯]
static=HK, server-tag-regex=(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|美)).)*$, check-interval=600, tolerance=0, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Country/R/HK.png
static=TW, server-tag-regex=(?=.*(台|TW|(?i)Taiwan))^((?!(港|日|韩|新|美)).)*$, check-interval=600, tolerance=0, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Country/R/TW.png
static=JP, server-tag-regex=(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$, check-interval=600, tolerance=0, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Country/R/JP.png
static=KR, server-tag-regex=(?=.*(韩|KR|(?i)Korea))^((?!(港|台|日|美|新)).)*$, check-interval=600, tolerance=0, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Country/R/KR.png
static=SG, server-tag-regex=(?=.*(新|狮|獅|SG|(?i)Singapore))^((?!(港|台|日|韩|美)).)*$, check-interval=600, tolerance=0, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Country/R/SG.png
static=US, server-tag-regex=(?=.*(美|US|(?i)States|American))^((?!(港|台|日|韩|新)).)*$, check-interval=600, tolerance=0, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Country/R/US.png
static=UN, server-tag-regex=(?=.*(俄|RS|(?i)Russia))^((?!(港|台|日|韩|新|美)).)*$, check-interval=600, tolerance=0, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Country/R/UN.png

# 机场策略组
# 由于部分机场必须由自己的节点拉取订阅，制定此策略组用于拉取订阅
static=Flower, server-tag-regex=(?=.*(标准|高级|实验性).*IEPL.*专线), check-interval=600, tolerance=0, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Provider/Flower.png
static=Enet, server-tag-regex=(?=.*(Base|家宽).*), check-interval=600, tolerance=0, img-url=https://raw.githubusercontent.com/zirawell/R-Store/main/Res/Icon/Provider/Enet.png

